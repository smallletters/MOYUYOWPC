/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

      <!-- 商品信息摘要卡片 -->
      <section class="mx-4 mt-4 flex items-center gap-3 p-3" style="border-radius: var(--radius); border: 1px solid var(--border); background-color: var(--card); box-shadow: var(--shadow-xs);">
        <img src="../assets/product-shampoo-bottle.jpg" alt="MOYUYO 温和沐浴露 500ml" class="h-16 w-16 shrink-0 object-cover" style="border-radius: calc(var(--radius) - 4px);">
        <div class="min-w-0 flex-1">
          <h2 class="text-sm font-semibold truncate" style="color: var(--foreground);">MOYUYO 温和沐浴露 500ml</h2>
          <p class="mt-1 text-sm font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$28.00</p>
          <p class="mt-0.5 text-xs" style="color: var(--muted-foreground);">单次购买价</p>
        </div>
      </section>

      <!-- Subscribe & Save 标题 -->
      <section class="mt-5 px-4">
        <div class="flex items-center gap-2">
          <h3 class="text-base font-bold" style="color: var(--foreground);">Subscribe & Save</h3>
          <span class="inline-flex items-center px-2 py-0.5 text-xs font-bold" style="border-radius: 999px; background-color: var(--brand-50); color: var(--primary);">省10%</span>
        </div>
        <p class="mt-1.5 text-xs leading-relaxed" style="color: var(--muted-foreground);">选择配送周期，定期自动送达，享受订阅专属折扣</p>
      </section>

      <!-- 订阅周期选择（3个卡片式选项） -->
      <section class="mt-4 px-4 flex flex-col gap-3">

        <!-- 每月配送（默认选中） -->
        <div class="plan-card selected relative flex items-center gap-3 p-4" style="border-radius: var(--radius); border: 1.5px solid var(--border); background-color: var(--card);" role="radio" aria-checked="true">
          <div class="plan-radio">
            <div class="plan-radio-dot"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-baseline gap-2">
              <span class="text-sm font-semibold" style="color: var(--foreground);">每月配送</span>
              <span class="text-xs font-bold" style="color: var(--primary);">省10%</span>
            </div>
            <p class="mt-1 text-base font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$25.20<span class="text-xs font-normal" style="color: var(--muted-foreground);">/月</span></p>
          </div>
        </div>

        <!-- 双月配送 -->
        <div class="plan-card relative flex items-center gap-3 p-4" style="border-radius: var(--radius); border: 1.5px solid var(--border); background-color: var(--card);" role="radio" aria-checked="false">
          <div class="plan-radio">
            <div class="plan-radio-dot"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-baseline gap-2">
              <span class="text-sm font-semibold" style="color: var(--foreground);">双月配送</span>
              <span class="text-xs font-bold" style="color: var(--primary);">省10%</span>
            </div>
            <p class="mt-1 text-base font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$50.40<span class="text-xs font-normal" style="color: var(--muted-foreground);">/2月</span></p>
            <div class="mt-1.5 flex items-center gap-1.5">
              <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
              <span class="text-xs" style="color: var(--state-success); font-weight: 500;">免运费</span>
            </div>
          </div>
        </div>

        <!-- 季度配送（推荐） -->
        <div class="plan-card relative flex items-center gap-3 p-4" style="border-radius: var(--radius); border: 1.5px solid var(--border); background-color: var(--card);" role="radio" aria-checked="false">
          <!-- 推荐标签 -->
          <span class="recommend-badge">推荐</span>
          <div class="plan-radio">
            <div class="plan-radio-dot"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-baseline gap-2">
              <span class="text-sm font-semibold" style="color: var(--foreground);">季度配送</span>
              <span class="text-xs font-bold" style="color: var(--primary);">省10%</span>
            </div>
            <p class="mt-1 text-base font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$75.60<span class="text-xs font-normal" style="color: var(--muted-foreground);">/3月</span></p>
            <div class="mt-1.5 flex items-center gap-3">
              <div class="flex items-center gap-1.5">
                <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
                <span class="text-xs" style="color: var(--state-success); font-weight: 500;">免运费</span>
              </div>
              <div class="flex items-center gap-1.5">
                <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
                <span class="text-xs" style="color: var(--state-success); font-weight: 500;">赠品</span>
              </div>
            </div>
          </div>
        </div>

      </section>

      <!-- 订阅权益说明列表 -->
      <section class="mt-5 px-4">
        <h4 class="text-sm font-semibold" style="color: var(--foreground);">订阅权益</h4>
        <div class="mt-2.5 flex flex-col gap-3 p-4" style="border-radius: var(--radius); border: 1px solid var(--border); background-color: var(--card);">

          <!-- 权益1: 自动享 10% off -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">自动享 10% off</span>
          </div>

          <!-- 权益2: 免运费 -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">免运费</span>
          </div>

          <!-- 权益3: 随时调整周期/暂停/取消 -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">随时调整周期 / 暂停 / 取消</span>
          </div>

          <!-- 权益4: 提前 7 天续订提醒 -->
          <div class="flex items-start gap-2.5">
            <span data-icon class="w-4.5 h-4.5 shrink-0 mt-0.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/check.svg'); color: var(--state-success);"></span>
            <span class="text-sm" style="color: var(--foreground);">提前 7 天续订提醒</span>
          </div>

        </div>
      </section>

      <!-- 配送信息 -->
      <section class="mt-5 px-4">
        <h4 class="text-sm font-semibold" style="color: var(--foreground);">配送信息</h4>
        <div class="mt-2.5 flex flex-col gap-3 p-4" style="border-radius: var(--radius); border: 1px solid var(--border); background-color: var(--card);">

          <!-- 首次配送日期 -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2.5">
              <span data-icon class="w-4.5 h-4.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); color: var(--icon-500);"></span>
              <span class="text-sm" style="color: var(--muted-foreground);">首次配送日期</span>
            </div>
            <div class="flex items-center gap-1">
              <span class="text-sm font-semibold" style="color: var(--foreground);">2026-07-15</span>
              <i data-lucide="chevron-right" class="h-3.5 w-3.5" style="color: var(--icon-400);"></i>
            </div>
          </div>

          <!-- 分隔线 -->
          <div style="height: 1px; background-color: var(--border);"></div>

          <!-- 配送地址 -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2.5">
              <span data-icon class="w-4.5 h-4.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); mask-image: url('../assets/icons/dl-builtin-apple/map-pin.svg'); color: var(--icon-500);"></span>
              <span class="text-sm" style="color: var(--muted-foreground);">配送地址</span>
            </div>
            <div class="flex items-center gap-1 min-w-0">
              <span class="text-sm font-semibold truncate" style="color: var(--foreground);">默认地址 - Los Angeles</span>
              <i data-lucide="chevron-right" class="h-3.5 w-3.5 shrink-0" style="color: var(--icon-400);"></i>
            </div>
          </div>

        </div>
      </section>

      <!-- 底部固定 CTA -->
      <div class="fixed bottom-0 inset-x-0 z-40" style="background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);">
        <div class="px-4 pt-3 pb-3" style="padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));">
          <!-- 订阅总价 -->
          <div class="flex items-baseline justify-between mb-2.5">
            <span class="text-xs" style="color: var(--muted-foreground);">订阅总价</span>
            <span class="text-lg font-bold" style="color: var(--foreground); font-variant-numeric: tabular-nums;">$25.20<span class="text-xs font-normal" style="color: var(--muted-foreground);">/月</span></span>
          </div>
          <!-- 开始订阅按钮 -->
          <button data-dom-id="cta-subscribe" class="flex w-full items-center justify-center h-12 text-sm font-bold whitespace-nowrap" style="border-radius: 999px; border: none; background-color: var(--primary); color: var(--primary-foreground); box-shadow: var(--shadow-md);">
            开始订阅
          </button>
          <!-- 底部小字 -->
          <p class="mt-2 text-center text-xs" style="color: var(--muted-foreground);">可随时取消，无额外费用</p>
        </div>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
