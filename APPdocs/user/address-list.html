    <style id="theme-vars">
/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background-color: var(--background-200);">

      <!-- 顶部导航栏 -->
      <header class="sticky top-0 z-30 border-b" style="border-color: var(--border); background-color: var(--background-50);">
        <div class="flex h-11 items-center px-4">
          <!-- 返回按钮 -->
          <button data-dom-id="back-previous" class="inline-flex h-8 w-8 items-center justify-center" style="border-radius: var(--radius); border: 1px solid var(--border); background-color: var(--background-50); color: var(--foreground); cursor: pointer; transition: background-color 0.16s ease;" aria-label="返回" onmouseover="this.style.backgroundColor='var(--secondary)'" onmouseout="this.style.backgroundColor='var(--background-50)'">
            <i data-lucide="chevron-left" class="h-4 w-4"></i>
          </button>
          <!-- 居中标题 -->
          <div class="min-w-0 flex-1 text-center text-base font-semibold" style="color: var(--text-800); letter-spacing: -0.02em;">
            收货地址
          </div>
          <!-- 右侧占位平衡区域 -->
          <div class="w-8"></div>
        </div>
      </header>

      <!-- 地址列表区域 -->
      <div id="address-list-container" class="flex flex-col gap-3 p-4">
        <!-- 由 JavaScript 动态渲染 -->
      </div>

      <!-- 底部新增地址按钮 -->
      <div class="p-4">
        <button data-dom-id="cta-add-address" class="flex w-full items-center justify-center whitespace-nowrap" style="height: 44px; border: 1px solid var(--brand-500); border-radius: 999px; background: transparent; color: var(--brand-500); font-size: 14px; font-weight: 600; cursor: pointer; transition: background-color 0.18s ease, color 0.18s ease;" onmouseover="this.style.backgroundColor='var(--brand-100)'; this.style.color='var(--brand-500)'" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--brand-500)'" onfocus="this.style.outline='2px solid var(--ring)'; this.style.outlineOffset='2px'" onblur="this.style.outline='none'">
          <i data-lucide="plus" class="mr-1.5 h-4 w-4"></i>
          新增收货地址
        </button>
      </div>

    </main>
    <script>
      lucide.createIcons();

      // Toast 提示
      function showToast(msg) {
        var t = document.createElement('div');
        t.textContent = msg;
        Object.assign(t.style, {
          position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
          background: 'rgba(0,0,0,0.8)', color: '#fff', padding: '10px 24px',
          borderRadius: '999px', fontSize: '14px', zIndex: '9999',
          transition: 'opacity 0.3s ease', opacity: '0'
        });
        document.body.appendChild(t);
        requestAnimationFrame(function() { t.style.opacity = '1'; });
        setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 2000);
      }

      // ===== 地址数据管理 =====
      function getAddresses() {
        try { return JSON.parse(localStorage.getItem('moyuyo_addresses')) || []; } catch(e) { return []; }
      }
      function saveAddresses(arr) {
        localStorage.setItem('moyuyo_addresses', JSON.stringify(arr));
      }
      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      }

      // ===== 渲染地址列表 =====
      function renderAddressList() {
        var container = document.getElementById('address-list-container');
        var list = getAddresses();

        if (list.length === 0) {
          container.innerHTML = '<div class="flex flex-col items-center justify-center py-16"><i data-lucide="map-pin" class="w-10 h-10 mb-3" style="color: var(--icon-300);"></i><p class="text-sm" style="color: var(--text-400);">暂无收货地址</p><p class="text-xs mt-1" style="color: var(--text-400);">点击下方按钮添加新地址</p></div>';
          lucide.createIcons();
          return;
        }

        var html = '';
        for (var i = 0; i < list.length; i++) {
          var addr = list[i];
          var isDefault = addr.isDefault;
          html += '<article data-addr-id="' + addr.id + '" class="relative flex items-start gap-3 overflow-hidden" style="background-color: var(--background-50); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 14px 14px 18px; box-shadow: var(--shadow-xs); cursor: pointer; transition: transform 0.18s ease, box-shadow 0.18s ease;" onmouseover="this.style.transform=\'translateY(-1px)\'; this.style.boxShadow=\'var(--shadow-sm)\'" onmouseout="this.style.transform=\'none\'; this.style.boxShadow=\'var(--shadow-xs)\'">' +
            (isDefault ? '<div class="absolute left-0 top-0 bottom-0 w-1" style="background-color: var(--brand-100);"></div>' : '') +
            '<div class="flex h-10 w-10 shrink-0 items-center justify-center" style="background-color: var(--background-200); border-radius: calc(var(--radius) * 0.8);">' +
            '<i data-lucide="map-pin" class="h-5 w-5" style="color: ' + (isDefault ? 'var(--brand-500)' : 'var(--icon-muted)') + ';"></i></div>' +
            '<div class="flex min-w-0 flex-1 flex-col gap-1">' +
            '<div class="flex items-center gap-2">' +
            '<span class="text-sm font-semibold" style="color: var(--text-800);">' + escapeHtml(addr.name) + '</span>' +
            '<span class="text-sm" style="color: var(--text-500);">' + escapeHtml(addr.phone) + '</span>' +
            (isDefault ? '<span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium whitespace-nowrap" style="background-color: var(--brand-100); color: var(--brand-500); border-radius: 999px; height: 20px;">默认</span>' : '') +
            '</div>' +
            '<p class="text-sm leading-relaxed" style="color: var(--text-500);">' + escapeHtml(addr.fullAddress) + '</p></div>' +
            '<div class="flex shrink-0 items-center gap-1">' +
            '<button data-action="edit" class="inline-flex h-8 w-8 items-center justify-center" style="border-radius: calc(var(--radius) * 0.6); color: var(--icon-muted); cursor: pointer; transition: background-color 0.16s ease, color 0.16s ease;" aria-label="编辑" onmouseover="this.style.backgroundColor=\'var(--background-200)\'; this.style.color=\'var(--brand-500)\'" onmouseout="this.style.backgroundColor=\'transparent\'; this.style.color=\'var(--icon-muted)\'">' +
            '<i data-lucide="pencil" class="h-4 w-4"></i></button>' +
            '<button data-action="delete" class="inline-flex h-8 w-8 items-center justify-center" style="border-radius: calc(var(--radius) * 0.6); color: var(--icon-muted); cursor: pointer; transition: background-color 0.16s ease, color 0.16s ease;" aria-label="删除" onmouseover="this.style.backgroundColor=\'var(--state-error-surface)\'; this.style.color=\'var(--state-error)\'" onmouseout="this.style.backgroundColor=\'transparent\'; this.style.color=\'var(--icon-muted)\'">' +
            '<i data-lucide="trash-2" class="h-4 w-4"></i></button></div></article>';
        }
        container.innerHTML = html;
        lucide.createIcons();
        bindAddressEvents();
      }

      // HTML 转义
      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
      }

      // ===== 绑定地址卡片事件 =====
      function bindAddressEvents() {
        // 编辑按钮
        document.querySelectorAll('[data-action="edit"]').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var id = this.closest('[data-addr-id]').getAttribute('data-addr-id');
            window.location.href = 'address-edit.html?id=' + id;
          });
        });
        // 删除按钮
        document.querySelectorAll('[data-action="delete"]').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var article = this.closest('[data-addr-id]');
            var id = article.getAttribute('data-addr-id');
            if (confirm('确定要删除该地址吗？')) {
              var list = getAddresses();
              var idx = -1;
              for (var i = 0; i < list.length; i++) {
                if (list[i].id === id) { idx = i; break; }
              }
              if (idx !== -1) {
                list.splice(idx, 1);
                saveAddresses(list);
                renderAddressList();
                showToast('地址已删除');
              }
            }
          });
        });
        // 点击设为默认
        document.querySelectorAll('[data-addr-id]').forEach(function(card) {
          card.addEventListener('click', function() {
            var id = this.getAttribute('data-addr-id');
            var list = getAddresses();
            for (var i = 0; i < list.length; i++) {
              list[i].isDefault = (list[i].id === id);
            }
            saveAddresses(list);
            renderAddressList();
            showToast('已设为默认地址');
          });
        });
      }

      // ===== 初始化 =====
      renderAddressList();

      // 返回按钮
      document.getElementById('back-previous') && document.getElementById('back-previous').addEventListener('click', function() {
        window.history.length > 1 ? window.history.back() : window.location.href = 'settings.html';
      });

      // 新增地址
      document.querySelector('[data-dom-id="cta-add-address"]').addEventListener('click', function() {
        window.location.href = 'address-edit.html';
      });
    </script>
</body>
</html>
