    <style id="theme-vars">
/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

    </style>
    <style id="component-vars">
/*
 * components.css - aggregated component CSS
 * Auto-extracted from preview/component-*.html files.
 * DO NOT EDIT. Regenerate with extract-components-css.mjs.
 *
 * Foundation tokens live in colors_and_type.css.
 * This file consumes those tokens via var(--*) references.
 */

/* ============================================================
 * Button
 * source: preview/component-button.html
 * rules: 10
 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:calc(var(--spacing)*1.5);height:40px;padding:0 20px;border:none;border-radius:calc(var(--radius)*2);background:transparent;color:var(--foreground);font:600 14px/1 var(--font-sans);letter-spacing:var(--tracking-normal);white-space:nowrap;box-shadow:var(--shadow-sm);cursor:pointer;transition:background-color .18s ease,color .18s ease,opacity .18s ease,filter .18s ease}
.btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.btn:disabled{opacity:.42;cursor:not-allowed}
.btn-primary{background:var(--primary);color:var(--primary-foreground)}
.btn-primary:hover{filter:brightness(.96)}
.btn-secondary{height:48px;padding:0 24px;background:var(--secondary);color:var(--secondary-foreground)}
.btn-secondary:hover{background:var(--muted)}
.btn-text{height:48px;padding:0 4px;box-shadow:none}
.btn-text:hover{color:var(--primary)}
.btn-lg{height:56px;padding:0 28px;font-size:16px}

/* ============================================================
 * Card
 * source: preview/component-card.html
 * rules: 12
 */
.card{width:188px;min-height:148px;padding:calc(var(--spacing)*5);display:flex;flex-direction:column;justify-content:space-between;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card.disabled,.card.disabled:hover{opacity:.5;transform:none;box-shadow:var(--shadow-md)}
.eyebrow,.meta{color:var(--muted-foreground);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.title{margin:6px 0 8px;font-size:18px;line-height:1.15}
.body-copy{margin:0;color:var(--muted-foreground);font-size:13px}
.cta{display:inline-flex;align-items:center;justify-content:center;width:max-content;margin-top:12px;padding:calc(var(--spacing)*2) calc(var(--spacing)*3.5);border-radius:999px;background:var(--primary);color:var(--primary-foreground);font-size:12px;font-weight:700;text-decoration:none}
.media{aspect-ratio:4/3;border-radius:calc(var(--radius) - 4px);background:linear-gradient(135deg,var(--secondary),var(--accent));border:1px solid var(--border)}
.media-card{min-height:212px;padding:calc(var(--spacing)*4)}
.media-card .title{font-size:16px;margin:10px 0 6px}
.price{font-size:12px;color:var(--muted-foreground)}
.dark{background:var(--card);color:var(--card-foreground)}

/* ============================================================
 * Input
 * source: preview/component-input.html
 * rules: 10
 */
.surface{display:flex;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*3);border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm)}
.field{display:flex;align-items:center;gap:calc(var(--spacing)*2);min-width:240px;height:44px;padding:0 calc(var(--spacing)*3);border:1px solid var(--input);border-radius:var(--radius);background:var(--background);color:var(--foreground);box-shadow:var(--shadow-xs)}
.field.small{height:40px}
.field:focus-within{border-color:var(--ring);box-shadow:0 0 0 1px var(--ring)}
.field.disabled{opacity:.55}
.icon,.clear{padding:0;border:0;background:transparent;color:var(--icon-muted);font:inherit}
.icon{font-size:13px}
.control{flex:1;border:0;outline:0;background:transparent;color:inherit;font:inherit}
.control::placeholder{color:var(--muted-foreground)}
    </style>

    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
      /* 页面专用样式 */
      body {
        font-family: 'DM Sans', -apple-system, sans-serif;
        background-color: var(--background-200);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* 头像占位渐变 */
      .avatar-placeholder {
        background: linear-gradient(135deg, var(--brand-100) 0%, var(--brand-300) 50%, var(--brand-500) 100%);
      }
      /* 性别/选项按钮通用样式 */
      .option-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 20px;
        border-radius: 999px;
        border: 1.5px solid var(--border);
        background: var(--background-50);
        color: var(--text-500);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .option-chip.active {
        border-color: var(--brand-500);
        background: var(--brand-50);
        color: var(--brand-500);
        font-weight: 600;
      }
      /* IP 偏好卡片 */
      .ip-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 16px 8px;
        border-radius: var(--radius);
        border: 1.5px solid var(--border);
        background: var(--background-50);
        cursor: pointer;
        transition: all 0.2s ease;
        min-width: 72px;
      }
      .ip-card.active {
        border-color: var(--brand-500);
        background: var(--brand-50);
        box-shadow: 0 0 0 1px var(--brand-500);
      }
      .ip-card .ip-name {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--text-800);
      }
      .ip-card.active .ip-name {
        color: var(--brand-500);
      }
      .ip-card .ip-icon-circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        transition: all 0.2s ease;
      }
      /* IP 图标颜色 */
      .ip-milo .ip-icon-circle {
        background: linear-gradient(135deg, #a8e6cf, #56c596);
        color: #fff;
      }
      .ip-luna .ip-icon-circle {
        background: linear-gradient(135deg, #dcd6f7, #a29bfe);
        color: #fff;
      }
      .ip-atlas .ip-icon-circle {
        background: linear-gradient(135deg, #ffd3b6, #ff9a56);
        color: #fff;
      }
      .ip-olive .ip-icon-circle {
        background: linear-gradient(135deg, #c4e5a3, #7bc86c);
        color: #fff;
      }
      .ip-card.active .ip-icon-circle {
        transform: scale(1.05);
        box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25);
      }
      /* 输入框聚焦状态 */
      .settings-input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        background: var(--background-50);
        color: var(--text-800);
        font-size: 15px;
        font-family: 'DM Sans', -apple-system, sans-serif;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .settings-input:focus {
        border-color: var(--brand-500);
        box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
      }
      .settings-input::placeholder {
        color: var(--text-400);
      }
      /* 多行文本区 */
      .settings-textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        background: var(--background-50);
        color: var(--text-800);
        font-size: 15px;
        font-family: 'DM Sans', -apple-system, sans-serif;
        outline: none;
        resize: none;
        line-height: 1.5;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .settings-textarea:focus {
        border-color: var(--brand-500);
        box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
      }
      .settings-textarea::placeholder {
        color: var(--text-400);
      }
      /* 分隔线 */
      .settings-divider {
        height: 1px;
        background-color: var(--border);
        margin-left: 16px;
      }
      /* 底部固定保存栏 */
      .save-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 40;
        padding: 12px 20px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
      }
      .save-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 50px;
        border: none;
        border-radius: var(--radius);
        background: var(--brand-500);
        color: var(--background-50);
        font-size: 16px;
        font-weight: 600;
        font-family: 'DM Sans', -apple-system, sans-serif;
        cursor: pointer;
        transition: filter 0.18s ease, opacity 0.18s ease;
        letter-spacing: 0.01em;
      }
      .save-btn:hover {
        filter: brightness(0.96);
      }
      .save-btn:active {
        filter: brightness(0.92);
      }
      /* 操作选项弹出层（拍照/相册） */
      .action-sheet-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(0, 0, 0, 0.35);
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .action-sheet-overlay.visible {
        display: flex;
      }
      .action-sheet {
        width: 100%;
        max-width: 375px;
        background: var(--background-200);
        border-radius: 16px 16px 0 0;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        animation: slide-up 0.25s ease;
      }
      @keyframes slide-up {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .action-sheet-option {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 56px;
        background: var(--background-50);
        color: var(--brand-500);
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        width: 100%;
        font-family: 'DM Sans', -apple-system, sans-serif;
        transition: background-color 0.15s ease;
      }
      .action-sheet-option:first-child {
        border-radius: 16px 16px 0 0;
      }
      .action-sheet-option:hover {
        background: var(--background-100);
      }
      .action-sheet-cancel {
        margin-top: 8px;
        border-radius: 16px 16px 0 0;
        color: var(--text-500);
        font-size: 17px;
        font-weight: 600;
      }
      /* 昵称可用性提示 */
      .name-hint {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        margin-top: 6px;
      }
      .name-hint.success {
        color: var(--state-success);
      }
      .name-hint.error {
        color: var(--state-error);
      }
      .name-hint.default {
        color: var(--text-400);
      }
    </style>

        <!-- 返回按钮 -->
        <a href="profile.html" data-dom-id="cta-back" class="inline-flex h-9 w-9 items-center justify-center rounded-lg transition-colors duration-150 hover:opacity-70" aria-label="返回" style="background-color: transparent;">
          <span data-icon class="w-5 h-5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-left.svg'); color: var(--brand-500);"></span>
        </a>
        <!-- 标题 -->
        <h1 class="text-base font-semibold" style="color: var(--text-800); letter-spacing: -0.02em;">编辑资料</h1>
        <!-- 占位保持标题居中 -->
        <div class="w-9 h-9"></div>
      </header>

      <!-- 可滚动内容区 -->
      <div class="px-4 pt-6 pb-28 flex flex-col gap-6">

        <!-- ===== 头像编辑区域 ===== -->
        <section class="flex flex-col items-center gap-3" aria-label="头像编辑">
          <div class="relative">
            <!-- 120px 圆形渐变占位头像 -->
            <div class="avatar-placeholder w-[120px] h-[120px] rounded-full overflow-hidden flex items-center justify-center" style="box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
              <span class="text-2xl font-bold" style="color: var(--background-50);">M</span>
            </div>
            <!-- 相机图标叠加在右下角 -->
            <button class="absolute bottom-0 right-0 w-9 h-9 rounded-full flex items-center justify-center transition-transform duration-150 hover:scale-105 active:scale-95" style="background: var(--brand-500); box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3); border: 2.5px solid var(--background-50);" aria-label="更换头像" data-dom-id="cta-change-avatar">
              <i data-lucide="camera" class="w-4 h-4" style="color: var(--background-50);"></i>
            </button>
          </div>
          <span class="text-xs" style="color: var(--text-400);">点击更换头像</span>
        </section>

        <!-- ===== 昵称编辑 ===== -->
        <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);" aria-label="昵称编辑">
          <div class="px-4 pt-4 pb-1">
            <div class="flex items-center justify-between mb-2">
              <label class="text-sm font-medium" style="color: var(--text-800);">昵称</label>
              <span class="text-xs" style="color: var(--text-400);">2-20 个字符</span>
            </div>
            <!-- 当前昵称显示 + 编辑按钮 -->
            <div id="nickname-display" class="flex items-center justify-between py-2">
              <span class="text-base" style="color: var(--text-500);">宠物爱好者</span>
              <button class="inline-flex items-center gap-1 text-sm font-medium transition-opacity duration-150 hover:opacity-70" style="color: var(--brand-500); background: transparent; border: none; cursor: pointer;" data-dom-id="cta-edit-nickname" aria-label="编辑昵称">
                <i data-lucide="pen-line" class="w-3.5 h-3.5"></i>
                <span>编辑</span>
              </button>
            </div>
            <!-- 昵称输入框（默认隐藏） -->
            <div id="nickname-edit" class="hidden">
              <input type="text" class="settings-input" placeholder="请输入昵称" value="宠物爱好者" maxlength="20" data-dom-id="input-nickname" aria-label="昵称输入">
              <div class="flex items-center justify-between mt-1">
                <!-- 昵称可用性提示 -->
                <div id="nickname-hint" class="name-hint success">
                  <span data-icon class="w-3.5 h-3.5" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/circle-check.svg'); mask-image: url('../assets/icons/dl-builtin-apple/circle-check.svg');"></span>
                  <span>昵称可用</span>
                </div>
                <!-- 字数计数 -->
                <span class="text-xs" style="color: var(--text-400);"><span id="nickname-count">5</span>/20</span>
              </div>
            </div>
          </div>
        </section>

        <!-- ===== 个人简介编辑 ===== -->
        <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);" aria-label="个人简介编辑">
          <div class="px-4 pt-4 pb-3">
            <div class="flex items-center justify-between mb-2">
              <label class="text-sm font-medium" style="color: var(--text-800);">个人简介</label>
              <span class="text-xs" style="color: var(--text-400);">最多 100 字</span>
            </div>
            <textarea class="settings-textarea" rows="3" placeholder="介绍一下你和你的宠物吧..." maxlength="100" data-dom-id="input-bio" aria-label="个人简介">热爱生活的铲屎官，有一只叫小橘的猫咪，喜欢记录日常。</textarea>
            <div class="flex items-center justify-end mt-1">
              <span class="text-xs" style="color: var(--text-400);"><span id="bio-count">23</span>/100</span>
            </div>
          </div>
        </section>

        <!-- ===== 性别选择 ===== -->
        <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);" aria-label="性别选择">
          <div class="px-4 pt-4 pb-4">
            <label class="text-sm font-medium block mb-3" style="color: var(--text-800);">性别</label>
            <div class="flex items-center gap-3" id="gender-group">
              <button class="option-chip" data-value="male" aria-label="男">男</button>
              <button class="option-chip" data-value="female" aria-label="女">女</button>
              <button class="option-chip active" data-value="unset" aria-label="不设置" aria-pressed="true">不设置</button>
            </div>
          </div>
        </section>

        <!-- ===== 生日设置 ===== -->
        <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);" aria-label="生日设置">
          <div class="flex items-center justify-between px-4" style="height: 52px;">
            <span class="text-sm font-medium" style="color: var(--text-800);">生日</span>
            <div class="flex items-center gap-1 cursor-pointer" data-dom-id="cta-birthday">
              <span class="text-sm" style="color: var(--text-500);">1995-06-15</span>
              <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-right.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-right.svg'); color: var(--icon-400);"></span>
            </div>
          </div>
        </section>

        <!-- ===== 地区设置 ===== -->
        <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);" aria-label="地区设置">
          <div class="flex items-center justify-between px-4" style="height: 52px;">
            <span class="text-sm font-medium" style="color: var(--text-800);">地区</span>
            <div class="flex items-center gap-1 cursor-pointer" data-dom-id="cta-region">
              <span class="text-sm" style="color: var(--text-500);">上海市 浦东新区</span>
              <span data-icon class="w-4 h-4" style="-webkit-mask-image: url('../assets/icons/dl-builtin-apple/chevron-right.svg'); mask-image: url('../assets/icons/dl-builtin-apple/chevron-right.svg'); color: var(--icon-400);"></span>
            </div>
          </div>
        </section>

        <!-- ===== IP 偏好设置 ===== -->
        <section class="rounded-xl overflow-hidden" style="background-color: var(--background-50);" aria-label="IP 偏好设置">
          <div class="px-4 pt-4 pb-4">
            <div class="flex items-center justify-between mb-3">
              <label class="text-sm font-medium" style="color: var(--text-800);">IP 偏好</label>
              <span class="text-xs" style="color: var(--text-400);">可多选</span>
            </div>
            <div class="grid grid-cols-4 gap-3" id="ip-group">
              <!-- MILO -->
              <div class="ip-card ip-milo active" data-ip="milo" data-dom-id="ip-milo" role="checkbox" aria-checked="true" aria-label="MILO" tabindex="0">
                <div class="ip-icon-circle">M</div>
                <span class="ip-name">MILO</span>
              </div>
              <!-- LUNA -->
              <div class="ip-card ip-luna" data-ip="luna" data-dom-id="ip-luna" role="checkbox" aria-checked="false" aria-label="LUNA" tabindex="0">
                <div class="ip-icon-circle">L</div>
                <span class="ip-name">LUNA</span>
              </div>
              <!-- ATLAS -->
              <div class="ip-card ip-atlas" data-ip="atlas" data-dom-id="ip-atlas" role="checkbox" aria-checked="false" aria-label="ATLAS" tabindex="0">
                <div class="ip-icon-circle">A</div>
                <span class="ip-name">ATLAS</span>
              </div>
              <!-- OLIVE -->
              <div class="ip-card ip-olive active" data-ip="olive" data-dom-id="ip-olive" role="checkbox" aria-checked="true" aria-label="OLIVE" tabindex="0">
                <div class="ip-icon-circle">O</div>
                <span class="ip-name">OLIVE</span>
              </div>
            </div>
          </div>
        </section>

      </div>
    </main>

    <!-- 底部固定保存按钮 -->
    <div class="save-bar">
      <button class="save-btn" data-dom-id="cta-save">保存</button>
    </div>

    <!-- 头像更换操作选项（Action Sheet） -->
    <div class="action-sheet-overlay" id="avatar-action-sheet">
      <div class="action-sheet">
        <button class="action-sheet-option" data-dom-id="cta-camera" aria-label="拍照">
          <i data-lucide="camera" class="w-4 h-4 mr-2" style="color: var(--brand-500);"></i>
          拍照
        </button>
        <div style="height: 1px; background: var(--border);"></div>
        <button class="action-sheet-option" data-dom-id="cta-gallery" aria-label="从相册选择">
          <i data-lucide="image" class="w-4 h-4 mr-2" style="color: var(--brand-500);"></i>
          从相册选择
        </button>
        <div style="height: 8px;"></div>
        <button class="action-sheet-option action-sheet-cancel" data-dom-id="cta-cancel-avatar" aria-label="取消">取消</button>
      </div>
    </div>

    <script>
      // 页面初始化后创建 Lucide 图标
      lucide.createIcons();

      // ===== 头像更换操作面板 =====
      const avatarBtn = document.querySelector('[data-dom-id="cta-change-avatar"]');
      const actionSheet = document.getElementById('avatar-action-sheet');
      const cancelBtn = document.querySelector('[data-dom-id="cta-cancel-avatar"]');

      avatarBtn.addEventListener('click', function() {
        actionSheet.classList.add('visible');
      });

      cancelBtn.addEventListener('click', function() {
        actionSheet.classList.remove('visible');
      });

      // 点击遮罩关闭
      actionSheet.addEventListener('click', function(e) {
        if (e.target === actionSheet) {
          actionSheet.classList.remove('visible');
        }
      });

      // ===== 昵称编辑切换 =====
      const nicknameDisplay = document.getElementById('nickname-display');
      const nicknameEdit = document.getElementById('nickname-edit');
      const editNicknameBtn = document.querySelector('[data-dom-id="cta-edit-nickname"]');
      const nicknameInput = document.querySelector('[data-dom-id="input-nickname"]');
      const nicknameCount = document.getElementById('nickname-count');

      editNicknameBtn.addEventListener('click', function() {
        nicknameDisplay.classList.add('hidden');
        nicknameEdit.classList.remove('hidden');
        nicknameInput.focus();
        nicknameInput.select();
      });

      // 昵称字数计数
      nicknameInput.addEventListener('input', function() {
        nicknameCount.textContent = this.value.length;
      });

      // ===== 个人简介字数计数 =====
      const bioTextarea = document.querySelector('[data-dom-id="input-bio"]');
      const bioCount = document.getElementById('bio-count');

      bioTextarea.addEventListener('input', function() {
        bioCount.textContent = this.value.length;
      });

      // ===== 性别选择切换 =====
      const genderGroup = document.getElementById('gender-group');
      const genderChips = genderGroup.querySelectorAll('.option-chip');

      genderChips.forEach(function(chip) {
        chip.addEventListener('click', function() {
          genderChips.forEach(function(c) {
            c.classList.remove('active');
            c.setAttribute('aria-pressed', 'false');
          });
          this.classList.add('active');
          this.setAttribute('aria-pressed', 'true');
        });
      });

      // ===== IP 偏好多选切换 =====
      const ipGroup = document.getElementById('ip-group');
      const ipCards = ipGroup.querySelectorAll('.ip-card');

      ipCards.forEach(function(card) {
        card.addEventListener('click', function() {
          this.classList.toggle('active');
          const isActive = this.classList.contains('active');
          this.setAttribute('aria-checked', isActive ? 'true' : 'false');
        });
        // 键盘支持
        card.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.click();
          }
        });
      });
    </script>
</body>
</html>
