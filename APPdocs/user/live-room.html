    <style id="theme-vars">
:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff;
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759;
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30;
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* state-warning */
  --state-warning: #ff9500;

  /* ===== SEMANTIC ROLES ===== */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* TYPOGRAPHY */
  --font-sans: 'DM Sans', -apple-system, sans-serif;
  --font-serif: 'DM Sans', -apple-system, sans-serif;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12);

  /* SPACING */
  --spacing: 0.24rem;
}

.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}
    </style>
    <style id="component-vars">
.btn{display:inline-flex;align-items:center;justify-content:center;gap:calc(var(--spacing)*1.5);height:40px;padding:0 20px;border:none;border-radius:calc(var(--radius)*2);background:transparent;color:var(--foreground);font:600 14px/1 var(--font-sans);letter-spacing:var(--tracking-normal);white-space:nowrap;box-shadow:var(--shadow-sm);cursor:pointer;transition:background-color .18s ease,color .18s ease,opacity .18s ease,filter .18s ease}
.btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.btn:disabled{opacity:.42;cursor:not-allowed}
.btn-primary{background:var(--primary);color:var(--primary-foreground)}
.btn-primary:hover{filter:brightness(.96)}
.btn-secondary{height:48px;padding:0 24px;background:var(--secondary);color:var(--secondary-foreground)}
.btn-secondary:hover{background:var(--muted)}
.btn-text{height:48px;padding:0 4px;box-shadow:none}
.btn-text:hover{color:var(--primary)}
.btn-lg{height:56px;padding:0 28px;font-size:16px}
.card{width:188px;min-height:148px;padding:calc(var(--spacing)*5);display:flex;flex-direction:column;justify-content:space-between;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card.disabled,.card.disabled:hover{opacity:.5;transform:none;box-shadow:var(--shadow-md)}
.eyebrow,.meta{color:var(--muted-foreground);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.title{margin:6px 0 8px;font-size:18px;line-height:1.15}
.body-copy{margin:0;color:var(--muted-foreground);font-size:13px}
.cta{display:inline-flex;align-items:center;justify-content:center;width:max-content;margin-top:12px;padding:calc(var(--spacing)*2) calc(var(--spacing)*3.5);border-radius:999px;background:var(--primary);color:var(--primary-foreground);font-size:12px;font-weight:700;text-decoration:none}
.media{aspect-ratio:4/3;border-radius:calc(var(--radius) - 4px);background:linear-gradient(135deg,var(--secondary),var(--accent));border:1px solid var(--border)}
.media-card{min-height:212px;padding:calc(var(--spacing)*4)}
.media-card .title{font-size:16px;margin:10px 0 6px}
.price{font-size:12px;color:var(--muted-foreground)}
.surface{display:flex;gap:calc(var(--spacing)*2);padding:calc(var(--spacing)*3);border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-sm)}
.field{display:flex;align-items:center;gap:calc(var(--spacing)*2);min-width:240px;height:44px;padding:0 calc(var(--spacing)*3);border:1px solid var(--input);border-radius:var(--radius);background:var(--background);color:var(--foreground);box-shadow:var(--shadow-xs)}
.field.small{height:40px}
.field:focus-within{border-color:var(--ring);box-shadow:0 0 0 1px var(--ring)}
.field.disabled{opacity:.55}
.icon,.clear{padding:0;border:0;background:transparent;color:var(--icon-muted);font:inherit}
.icon{font-size:13px}
.control{flex:1;border:0;outline:0;background:transparent;color:inherit;font:inherit}
.control::placeholder{color:var(--muted-foreground)}
.webbar,.mobile{border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.webbar{display:flex;align-items:center;gap:calc(var(--spacing)*2);min-width:320px;height:44px;padding:0 calc(var(--spacing)*3);border-radius:var(--radius);background:var(--sidebar)}
.brand{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.link,.tab{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;color:inherit;text-decoration:none;white-space:nowrap;transition:background-color .18s ease,color .18s ease,opacity .18s ease}
.link{height:32px;padding:0 calc(var(--spacing)*2.5)}
.link:hover,.tab:hover{background:var(--secondary)}
.link:focus-visible,.tab:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.mobile{padding:calc(var(--spacing)*2);border-radius:calc(var(--radius)*1.1);background:var(--card)}
.screen{display:flex;align-items:flex-end;justify-content:center;width:188px;height:164px;padding:calc(var(--spacing)*3);border-radius:calc(var(--radius)*.9);background:linear-gradient(180deg,var(--background),var(--secondary))}
.tabbar{display:flex;gap:calc(var(--spacing)*1.5);padding:calc(var(--spacing)*1.5);border:1px solid var(--border);border-radius:999px;background:var(--card);box-shadow:var(--shadow-md)}
.tab{flex-direction:column;gap:2px;min-width:56px;height:56px;padding:0 calc(var(--spacing)*1.5);font-size:11px;text-align:center}
.dot{width:18px;height:18px;border-radius:999px;background:var(--secondary);box-shadow:inset 0 0 0 1px var(--border)}
.tab:hover .dot{background:var(--primary)}
.grid{display:grid;gap:8px;flex:1}
.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.muted{color:var(--muted-foreground)}
.is-disabled{opacity:.55}

    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-success: var(--success);
    --color-success-foreground: var(--success-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --radius-sm: var(--radius);
    --radius-md: var(--radius);
    --radius-lg: var(--radius);
    --radius-xl: var(--radius);
  }
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* ===== 直播间页面专用样式 ===== */

      /* 全屏直播画面占位区 */
      .live-video-area {
        position: relative;
        width: 100%;
        height: 50vh;
        min-height: 320px;
        background: linear-gradient(
          160deg,
          var(--background-800) 0%,
          var(--background-700) 40%,
          var(--background-800) 70%,
          var(--background-900) 100%
        );
        overflow: hidden;
      }

      /* 主播头像占位 */
      .anchor-avatar {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--brand-300), var(--brand-500));
        border: 2px solid rgba(255, 255, 255, 0.6);
        flex-shrink: 0;
      }

      /* 弹幕消息条 */
      .danmaku-item {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: var(--text-50);
        font-size: 12px;
        white-space: nowrap;
        max-width: 70%;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* 商品讲解标签 */
      .product-tag-live {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: var(--text-50);
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
      }

      /* 直播状态标签 */
      .live-status-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .live-status-tag.live {
        background: var(--state-error);
        color: var(--state-error-foreground);
      }
      .live-status-tag.playback {
        background: var(--background-400);
        color: var(--text-800);
  }

      /* 状态脉冲动画 */
      .pulse-dot {
        width: 6px;
        height: 6px;
    border-radius: 999px;
    background: var(--state-error-foreground);
    animation: pulse-dot-anim 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot-anim {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* 商品讲解列表项 */
  .live-product-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border-bottom: 1px solid var(--border);
    transition: background-color 0.15s ease;
  }
  .live-product-item:active {
    background: var(--muted);
  }
  .live-product-item:last-child {
    border-bottom: none;
  }

  /* 商品讲解状态标签 */
  .explain-status {
    display: inline-flex;
    align-items: center;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .explain-status.explaining {
    background: var(--state-error);
    color: var(--state-error-foreground);
  }
  .explain-status.explained {
    background: var(--muted);
    color: var(--muted-foreground);
  }
  .explain-status.pending {
    background: var(--background-200);
    color: var(--text-500);
  }

  /* 商品缩略图占位 */
  .product-thumb-placeholder {
    width: 56px;
    height: 56px;
    border-radius: calc(var(--radius) - 4px);
    background: linear-gradient(135deg, var(--background-200), var(--background-300));
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* 购买按钮 */
  .buy-btn-live {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 5px 14px;
    border-radius: 999px;
    border: none;
    background: var(--primary);
    color: var(--primary-foreground);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: filter 0.18s ease;
  }
  .buy-btn-live:hover {
    filter: brightness(0.96);
  }
  .buy-btn-live:active {
    filter: brightness(0.92);
  }

  /* 底部互动栏 */
  .live-interaction-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--background-50);
    border-top: 1px solid var(--border);
  }
  .live-input {
    flex: 1;
    height: 36px;
    padding: 0 12px;
    border: 1px solid var(--input);
    border-radius: 999px;
    background: var(--background-200);
    color: var(--foreground);
    font-size: 13px;
    outline: none;
    transition: border-color 0.18s ease;
  }
  .live-input::placeholder {
    color: var(--muted-foreground);
  }
  .live-input:focus {
    border-color: var(--ring);
  }

  /* 互动按钮 */
  .interaction-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    border: none;
    background: var(--background-200);
    color: var(--text-600);
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: background-color 0.18s ease;
  }
  .interaction-btn:active {
    background: var(--background-300);
  }

  /* 购物袋角标 */
  .cart-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    min-width: 14px;
    height: 14px;
    padding: 0 3px;
    border-radius: 999px;
    background: var(--state-error);
    color: var(--state-error-foreground);
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  /* 底部商品面板拖动指示条 */
  .drag-indicator {
    width: 36px;
    height: 4px;
    border-radius: 999px;
    background: var(--background-400);
    margin: 8px auto 4px;
  }

  /* 弹幕列表容器动画 */
  .danmaku-container {
    position: absolute;
    bottom: 70px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    padding: 0 12px;
    pointer-events: none;
  }

  /* 商品面板背景模糊效果 */
  .product-panel-backdrop {
    background: var(--background-50);
    border-top-left-radius: var(--radius);
    border-top-right-radius: var(--radius);
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
  }

  /* 观看人数 */
  .viewer-count {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.4);
    color: var(--text-50);
    font-size: 11px;
  }

  /* 关闭/分享图标按钮 */
  .overlay-icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(8px);

    border: none;
    color: var(--text-50);
    cursor: pointer;
    transition: background-color 0.15s ease;
  }
  .overlay-icon-btn:active {
    background: rgba(0, 0, 0, 0.55);
  }

  /* 直播信息栏 */
  .live-info-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--background-50);
    border-bottom: 1px solid var(--border);
  }
  .info-stat {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 12px;
    color: var(--text-500);
  }

  /* 点赞浮动心形动画 */
  .like-float-heart {
    position: absolute;
    animation: float-heart 2s ease-out forwards;
    pointer-events: none;
  }
  @keyframes float-heart {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
  }

<body class="min-h-screen font-sans antialiased" style="padding-top: 0;">
  <main class="relative" style="max-width: 393px; margin: 0 auto;">

    <!-- ===== 全屏直播画面占位区 ===== -->
