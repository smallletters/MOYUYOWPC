# ===== 生产环境配置（仅覆盖与 application.yml 不同的部分） =====

spring:
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}
    connection-timeout: 5s
    socket-timeout: 60s

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/moyuyo_prod?useSSL=true&requireSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: ${MYSQL_USER:moyuyo}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 600000

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    enabled: false

# RocketMQ
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:rocketmq-namesrv:9876}
  producer:
    group: moyuyo-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    currency: usd
  paypal:
    client-id: ${PAYPAL_CLIENT_ID}
    client-secret: ${PAYPAL_CLIENT_SECRET}
    webhook-id: ${PAYPAL_WEBHOOK_ID}
    mode: live

admin:
  email: ${ADMIN_EMAIL:}
  password: ${ADMIN_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true

logging:
  level:
    root: INFO
    com.moyuyo: INFO
    org.springframework: WARN
  file:
    path: /var/log/moyuyo
    max-size: 100MB
    max-history: 30
