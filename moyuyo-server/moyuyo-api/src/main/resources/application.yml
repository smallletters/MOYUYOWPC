server:
  port: 8080

spring:
  application:
    name: moyuyo-server
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/moyuyo_dev?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    # ⚠️ 警告：生产环境（application-prod.yml）无默认值，必须通过环境变量 MYSQL_PASSWORD 设置
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Elasticsearch 配置
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 60s

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: false
    placeholder-replacement: false
    table: schema_history

  # Sentinel 限流熔断（开发环境禁用，生产环境通过 sentinel:enabled: true 和 SENTINEL_DASHBOARD_URL 启用）
  cloud:
    sentinel:
      enabled: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.moyuyo.dao.entity,com.moyuyo.dao.admin.entity
  global-config:
    db-config:
      id-type: ASSIGN_ID
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
# ⚠️ 警告：生产环境必须通过环境变量 JWT_SECRET 设置一个足够复杂的密钥
jwt:
  secret: ${JWT_SECRET:DevJwtSecretKeyForLocalTestingOnlyNotForProd}
  expire-hours: 2

# API 签名验证
api:
  signature:
    secret: ${API_SIGN_SECRET:}

# 管理员账号（开发环境默认值）
admin:
  email: ${ADMIN_EMAIL:admin@moyuyo.com}
  password: ${ADMIN_PASSWORD:moyuyo123}

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# RocketMQ
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:localhost:9876}
  producer:
    group: moyuyo-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# 支付渠道
payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    currency: usd
  paypal:
    client-id: ${PAYPAL_CLIENT_ID:placeholder}
    client-secret: ${PAYPAL_CLIENT_SECRET:placeholder}
    webhook-id: ${PAYPAL_WEBHOOK_ID:placeholder}
    mode: sandbox

# WooCommerce
woocommerce:
  url: ${WOOCOMMERCE_URL:https://your-woocommerce-store.com}
  consumer-key: ${WOOCOMMERCE_CONSUMER_KEY:}
  consumer-secret: ${WOOCOMMERCE_CONSUMER_SECRET:}
  connect-timeout: 10000
  read-timeout: 30000

